<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
<div class="bg-white p-8 rounded-lg shadow-lg w-96">
    <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">URL Shortener</h1>

    <form action="/ui/shorten" method="POST" class="space-y-4">
        <input type="text" name="originalurl" placeholder="Paste your long URL here..."
               class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">
            Shorten URL
        </button>
    </form>

    <div th:if="${shortUrl}" class="mt-6 p-4 bg-green-50 border border-green-200 rounded text-center">
        <p class="text-sm text-gray-600">Your short link is ready:</p>
        <a th:href="${shortUrl}" th:text="${shortUrl}" class="text-blue-600 font-bold hover:underline" target="_blank"></a>
    </div>
</div>
